@if (!isMobile()) {
<div class="row">
    <app-item-types [noTitle]="true"></app-item-types>
    <app-item-level [noTitle]="true"></app-item-level>
</div>
@if(!open()) {
<app-recap-stats></app-recap-stats>
}

}
