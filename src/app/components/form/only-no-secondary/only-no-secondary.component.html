<h3>{{ "only-no-secondary.label" | translate }}</h3>
<section>
    <mat-button-toggle-group>
        <mat-button-toggle (change)="onlyNoSecondaryFormService.setValue(true)"
            [checked]="onlyNoSecondaryFormService.currentValue()">{{ "only-no-secondary.oui" | translate
            }}</mat-button-toggle>
        <mat-button-toggle (change)="onlyNoSecondaryFormService.setValue(false)"
            [checked]="!onlyNoSecondaryFormService.currentValue()">{{ "only-no-secondary.non" | translate
            }}</mat-button-toggle>
    </mat-button-toggle-group>
</section>
