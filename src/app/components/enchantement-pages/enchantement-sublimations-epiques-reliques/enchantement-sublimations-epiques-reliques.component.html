<div class="subli-container" [class.selected]="isSelected()" (appActivate)="onChooseSublimation()">
    <div class="row-name">
        <span>{{ displayName() }}</span>
        <app-favoris-button [item]="sublimation()" [height]="24"></app-favoris-button>
    </div>
    <div>
        <img (mouseenter)="onTooltipEnter($event)" (mouseleave)="onTooltipLeave()"
            [src]="imageService.getItemUrl(sublimation().gfxId)" [alt]="">
    </div>
</div>
