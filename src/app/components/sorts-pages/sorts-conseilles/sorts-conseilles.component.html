<div class="card">
    <div class="header">
        {{'sorts.sort-conseille' | translate}}
    </div>
    <div class="content">
        @if (loading()) {
        @for (item of skeletonItems; track $index) {
        <div class="sort-conseille">
            <div class="skeleton-sort"></div>
            <div class="skeleton-ratio"></div>
        </div>
        }
        } @else {
        @for (sort of sortsNeutreConseilles(); track sort.gfxId) {
        <div class="sort-conseille">
            <app-sort-image [sort]="sort" typeSort="NEUTRE"></app-sort-image>
            <span class="ratio">
                {{ratioUsageSortNeutre(sort)}}
            </span>
        </div>
        }
        @for (sort of sortsPassifConseilles(); track sort.gfxId) {
        <div class="sort-conseille">
            <app-sort-image [sort]="sort" typeSort="PASSIF"></app-sort-image>
            <span class="ratio">
                {{ratioUsageSortPassif(sort)}}
            </span>
        </div>
        }
        }
    </div>
</div>
